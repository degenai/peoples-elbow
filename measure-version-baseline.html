<!DOCTYPE html>
<html>
<head>
    <title>Baseline Measurement</title>
</head>
<body>
    <div id="header-version-number"></div>
    <script>
        async function runBenchmark() {
            const start = performance.now();
            let successCount = 0;
            const iterations = 10;

            for (let i = 0; i < iterations; i++) {
                try {
                    const response = await fetch('https://changelog-reader.alex-adamczyk.workers.dev?limit=1&offset=0');
                    const data = await response.json();
                    if (data.success) {
                        successCount++;
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            const end = performance.now();
            console.log(`Baseline (${iterations} network requests): ${(end - start).toFixed(2)}ms`);

            // To pass data back to node
            const resultDiv = document.createElement('div');
            resultDiv.id = 'benchmark-result';
            resultDiv.textContent = `Baseline: ${(end - start).toFixed(2)}ms`;
            document.body.appendChild(resultDiv);
        }
        runBenchmark();
    </script>
</body>
</html>
