<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle BG Gallery — Pick One</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            color: #CE9C00;
            font-size: 1.8rem;
            margin-bottom: 0.4rem;
        }

        p.intro {
            text-align: center;
            color: #666;
            margin-bottom: 2.5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .option {
            cursor: pointer;
            border: 3px solid #222;
            border-radius: 20px;
            padding: 1rem;
            transition: border-color 0.25s, background 0.25s;
        }

        .option:hover  { border-color: #CE9C00; }
        .option.chosen { border-color: #CE9C00; background: rgba(206,156,0,0.08); }

        .option h2 {
            text-align: center;
            color: #CE9C00;
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .option p.desc {
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }

        .scene {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-layer, .p-layer {
            position: absolute;
            inset: 0;
            border-radius: 16px;
        }

        .bg-layer { z-index: 0; }

        .p-layer {
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .photo {
            position: relative;
            z-index: 10;
            max-width: 78%;
            max-height: 78%;
            filter: drop-shadow(0 8px 32px rgba(0,105,55,0.45))
                    drop-shadow(0 4px 16px rgba(255,204,0,0.25));
        }

        #pick {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
            color: #CE9C00;
            min-height: 1.5rem;
        }
    </style>
</head>
<body>

<h1>Particle BG Gallery</h1>
<p class="intro">Click one to pick it. All animations are live.</p>

<div class="gallery" id="gallery"></div>
<div id="pick"></div>

<script>
const IMG = 'images/transparent raw.png';

const OPTIONS = [
    {
        name: '1 — Fireflies',
        desc: 'Glowing dots drift upward — warm, organic',
        bg: 'linear-gradient(135deg, rgba(0,60,30,0.6) 0%, rgba(0,30,50,0.5) 100%)',
        init: fireflies
    },
    {
        name: '2 — Orbit',
        desc: 'Three rings of particles in circular orbits',
        bg: 'linear-gradient(135deg, rgba(0,20,50,0.7) 0%, rgba(0,50,25,0.6) 100%)',
        init: orbit
    },
    {
        name: '3 — Orbit + Pulse',
        desc: 'Orbiting particles over expanding pulse rings',
        bg: 'linear-gradient(135deg, rgba(0,15,40,0.85) 0%, rgba(0,30,15,0.8) 100%)',
        init: (c) => { orbit(c); pulseRings(c); }
    },
    {
        name: '4 — Starfield',
        desc: 'Twinkling stars — minimal, clean',
        bg: 'linear-gradient(160deg, #070710 0%, rgba(0,20,40,0.95) 100%)',
        init: starfield
    },
    {
        name: '5 — Sparkle Burst',
        desc: 'Gold and green sparks pop outward from center',
        bg: 'linear-gradient(135deg, rgba(0,40,20,0.7) 0%, rgba(30,20,0,0.7) 100%)',
        init: sparkle
    }
];

// Build DOM
const gallery = document.getElementById('gallery');
OPTIONS.forEach((opt, idx) => {
    const card = document.createElement('div');
    card.className = 'option';
    card.innerHTML = `
        <h2>${opt.name}</h2>
        <p class="desc">${opt.desc}</p>
        <div class="scene">
            <div class="bg-layer" style="background:${opt.bg}"></div>
            <div class="p-layer" id="pl${idx}"></div>
            <img class="photo" src="${IMG}" alt="The People's Elbow">
        </div>
    `;
    card.addEventListener('click', () => {
        document.querySelectorAll('.option').forEach(c => c.classList.remove('chosen'));
        card.classList.add('chosen');
        document.getElementById('pick').textContent = `Selected: ${opt.name}`;
    });
    gallery.appendChild(card);
    opt.init(document.getElementById(`pl${idx}`));
});

// ─────────────────────────────────────────
// 1. FIREFLIES — upward drift, warm glow
// ─────────────────────────────────────────
function fireflies(container) {
    const colors = [
        '255, 204, 0',
        '0, 180, 80',
        '255, 240, 100'
    ];
    const COUNT = 22;
    let css = '';
    for (let i = 0; i < COUNT; i++) {
        const dx = (Math.random() - 0.5) * 100;
        css += `@keyframes ff${i} {
            0%   { transform: translate(0,0) scale(0); opacity:0; }
            12%  { opacity:.9; transform: translate(0,0) scale(1); }
            88%  { opacity:.6; }
            100% { transform: translate(${dx}px,-380px) scale(.3); opacity:0; }
        }`;
    }
    inject(css);
    for (let i = 0; i < COUNT; i++) {
        const c = colors[i % colors.length];
        const size = 4 + Math.random() * 7;
        const x = 5 + Math.random() * 90;
        const dur = 5 + Math.random() * 7;
        const delay = Math.random() * -12;
        const p = dot(c, size, `ff${i} ${dur}s ${delay}s infinite ease-in-out`);
        p.style.left = x + '%';
        p.style.bottom = '-8px';
        container.appendChild(p);
    }
}

// ─────────────────────────────────────────
// 2. ORBIT — circular rings
// ─────────────────────────────────────────
function orbit(container) {
    const rings = [
        { r: 55,  n: 4, spd: 7,  color: '255,204,0',  size: 7 },
        { r: 95,  n: 6, spd: 13, color: '0,160,70',   size: 5 },
        { r: 138, n: 9, spd: 21, color: '0,120,200',  size: 4 },
    ];
    let css = '';
    rings.forEach((ring, ri) => {
        css += `@keyframes orb${ri} {
            from { transform: rotate(0deg) translateX(${ring.r}px) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(${ring.r}px) rotate(-360deg); }
        }`;
    });
    inject(css);

    const center = document.createElement('div');
    center.style.cssText = 'position:absolute;top:50%;left:50%;width:0;height:0;';
    container.appendChild(center);

    rings.forEach((ring, ri) => {
        for (let i = 0; i < ring.n; i++) {
            const delay = -((ring.spd / ring.n) * i);
            const p = dot(ring.color, ring.size, `orb${ri} ${ring.spd}s ${delay}s linear infinite`);
            p.style.position = 'absolute';
            p.style.margin = `${-ring.size/2}px`;
            center.appendChild(p);
        }
    });
}

// ─────────────────────────────────────────
// 3. PULSE RINGS — expanding concentric
// ─────────────────────────────────────────
function pulseRings(container) {
    inject(`@keyframes pulse {
        0%   { transform: translate(-50%,-50%) scale(.05); opacity:0; }
        8%   { opacity:.85; }
        100% { transform: translate(-50%,-50%) scale(2.4); opacity:0; }
    }`);
    const palette = ['206,156,0', '0,105,55', '0,100,180', '206,156,0', '0,140,60', '50,150,220'];
    palette.forEach((c, i) => {
        const ring = document.createElement('div');
        ring.style.cssText = `
            position:absolute; top:50%; left:50%;
            width:160px; height:160px;
            border:2px solid rgba(${c},0.75);
            border-radius:50%;
            animation: pulse 3s ${(i * 0.5).toFixed(1)}s ease-out infinite;
            animation-fill-mode: backwards;
        `;
        container.appendChild(ring);
    });
}

// ─────────────────────────────────────────
// 4. STARFIELD — twinkling dots
// ─────────────────────────────────────────
function starfield(container) {
    inject(`@keyframes twinkle {
        0%,100% { opacity:.1; transform:scale(1); }
        50%     { opacity:1;  transform:scale(1.4); }
    }`);
    const colors = ['255,204,0','255,255,255','0,200,100','120,180,255'];
    for (let i = 0; i < 65; i++) {
        const c = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() < 0.75 ? 1 + Math.random() * 2 : 3 + Math.random() * 3;
        const p = dot(c, size, `twinkle ${2 + Math.random()*4}s ${(Math.random()*-6).toFixed(1)}s ease-in-out infinite`);
        p.style.left = Math.random()*100 + '%';
        p.style.top  = Math.random()*100 + '%';
        container.appendChild(p);
    }
}

// ─────────────────────────────────────────
// 5. SPARKLE BURST — pop outward from center
// ─────────────────────────────────────────
function sparkle(container) {
    const COUNT = 28;
    let css = '';
    for (let i = 0; i < COUNT; i++) {
        const angle = (Math.PI * 2 / COUNT) * i + (Math.random() - 0.5) * 0.8;
        const dist = 100 + Math.random() * 120;
        const ex = Math.cos(angle) * dist;
        const ey = Math.sin(angle) * dist;
        css += `@keyframes sp${i} {
            0%   { transform:translate(-50%,-50%) translate(0,0) scale(0); opacity:0; }
            15%  { opacity:1; transform:translate(-50%,-50%) translate(${ex*.2}px,${ey*.2}px) scale(1); }
            80%  { opacity:.7; }
            100% { transform:translate(-50%,-50%) translate(${ex}px,${ey}px) scale(0); opacity:0; }
        }`;
    }
    inject(css);
    const colors = ['206,156,0','0,180,80','255,230,50','0,200,100'];
    for (let i = 0; i < COUNT; i++) {
        const c = colors[i % colors.length];
        const size = 4 + Math.random() * 7;
        const isSquare = Math.random() > 0.55;
        const dur = 2 + Math.random() * 3;
        const delay = (Math.random() * -dur).toFixed(1);
        const p = dot(c, size, `sp${i} ${dur}s ${delay}s ease-out infinite`);
        p.style.left = '50%';
        p.style.top  = '50%';
        p.style.borderRadius = isSquare ? '2px' : '50%';
        container.appendChild(p);
    }
}

// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function dot(color, size, animation) {
    const el = document.createElement('div');
    el.style.cssText = `
        position:absolute;
        width:${size}px; height:${size}px;
        background:radial-gradient(circle, rgba(${color},.95) 0%, rgba(${color},.25) 65%, transparent 100%);
        border-radius:50%;
        box-shadow:0 0 ${size*2}px rgba(${color},.6);
        animation:${animation};
    `;
    return el;
}

function inject(css) {
    const el = document.createElement('style');
    el.textContent = css;
    document.head.appendChild(el);
}
</script>

</body>
</html>
